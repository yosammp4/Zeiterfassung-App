<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3C6E;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ACC1;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shineGrad" cx="35%" cy="28%" r="55%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <clipPath id="squircleClip">
      <rect x="16" y="16" width="480" height="480" rx="116" ry="116"/>
    </clipPath>
    <filter id="subtle-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D47A1" flood-opacity="0.25"/>
    </filter>
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="116" ry="116"
        fill="url(#bgGrad)" filter="url(#subtle-shadow)"/>
  <rect x="16" y="16" width="480" height="480" rx="116" ry="116"
        fill="url(#bgGrad)" clip-path="url(#squircleClip)"/>
  <rect x="16" y="16" width="480" height="480" rx="116" ry="116"
        fill="url(#shineGrad)" clip-path="url(#squircleClip)"/>
  <circle cx="380" cy="370" r="180"
          fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="48"
          clip-path="url(#squircleClip)"/>

  <g clip-path="url(#squircleClip)">
    <circle cx="256" cy="256" r="130"
            fill="none"
            stroke="rgba(255,255,255,0.9)"
            stroke-width="18"
            stroke-linecap="round"/>
    <circle cx="256" cy="256" r="100"
            fill="none"
            stroke="rgba(255,255,255,0.18)"
            stroke-width="2"/>
    <g stroke="rgba(255,255,255,0.85)" stroke-width="12" stroke-linecap="round">
      <line x1="256" y1="142" x2="256" y2="162"/>
      <line x1="370" y1="256" x2="350" y2="256"/>
      <line x1="256" y1="370" x2="256" y2="350"/>
      <line x1="142" y1="256" x2="162" y2="256"/>
    </g>
    <g stroke="rgba(255,255,255,0.3)" stroke-width="5" stroke-linecap="round">
      <line x1="314" y1="148" x2="308" y2="159"/>
      <line x1="364" y1="198" x2="353" y2="204"/>
      <line x1="364" y1="314" x2="353" y2="308"/>
      <line x1="314" y1="364" x2="308" y2="353"/>
      <line x1="198" y1="364" x2="204" y2="353"/>
      <line x1="148" y1="314" x2="159" y2="308"/>
      <line x1="148" y1="198" x2="159" y2="204"/>
      <line x1="198" y1="148" x2="204" y2="159"/>
    </g>
    <line x1="256" y1="256" x2="213" y2="202"
          stroke="white" stroke-width="16" stroke-linecap="round"/>
    <line x1="256" y1="256" x2="316" y2="192"
          stroke="white" stroke-width="12" stroke-linecap="round"/>
    <circle cx="256" cy="256" r="12" fill="white"/>
    <circle cx="256" cy="256" r="5" fill="#1565C0"/>
    <path d="M 256,126 A 130,130 0 0,1 368.5,191"
          fill="none"
          stroke="#40E0FF"
          stroke-width="18"
          stroke-linecap="round"
          opacity="0.85"/>
  </g>
</svg>
